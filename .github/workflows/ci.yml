name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'main' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            backend: epoll
          - os: ubuntu-latest
            backend: io_uring
          - os: macos-latest
            backend: kqueue
    name: ${{ matrix.os }} / ${{ matrix.backend }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Zig version
        id: zig
        run: echo "required=0.16.0" >> "$GITHUB_OUTPUT"

      - name: Resolve Zig URL
        id: zig-resolve
        shell: bash
        run: |
          VERSION="${{ steps.zig.outputs.required }}"

          # Map runner arch / OS to ziglang.org index.json keys
          case "${{ runner.arch }}" in
            X64)   ZIG_ARCH="x86_64" ;;
            ARM64) ZIG_ARCH="aarch64" ;;
          esac
          case "${{ runner.os }}" in
            Linux)   ZIG_OS="linux";   ZIG_EXT="tar.xz" ;;
            macOS)   ZIG_OS="macos";   ZIG_EXT="tar.xz" ;;
          esac
          ZIG_KEY="${ZIG_ARCH}-${ZIG_OS}"

          curl -sL https://ziglang.org/download/index.json > /tmp/zig-index.json

          URL=$(jq -r --arg v "$VERSION" --arg k "$ZIG_KEY" '.[$v][$k].tarball // empty' /tmp/zig-index.json)
          SHA=$(jq -r --arg v "$VERSION" --arg k "$ZIG_KEY" '.[$v][$k].shasum // empty' /tmp/zig-index.json)

          if [ -z "$URL" ]; then
            echo "::error::Zig $VERSION not found in index.json for $ZIG_KEY"
            exit 1
          fi
          RESOLVED_VER="$VERSION"

          echo "url=$URL"               >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"            >> "$GITHUB_OUTPUT"
          echo "resolved=$RESOLVED_VER" >> "$GITHUB_OUTPUT"
          echo "ext=$ZIG_EXT"           >> "$GITHUB_OUTPUT"
          echo "Installing Zig $RESOLVED_VER from $URL"

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/zig
          key: zig-${{ runner.os }}-${{ runner.arch }}-${{ steps.zig-resolve.outputs.resolved }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -eu
          URL="${{ steps.zig-resolve.outputs.url }}"
          EXPECTED_SHA="${{ steps.zig-resolve.outputs.sha256 }}"
          EXT="${{ steps.zig-resolve.outputs.ext }}"
          ZIG_ROOT="$HOME/.local/share/zig"
          DOWNLOAD="${{ runner.temp }}/zig-download"

          curl -fsSL "$URL" -o "$DOWNLOAD"

          ACTUAL_SHA=$(sha256sum "$DOWNLOAD" | cut -d' ' -f1)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA-256 mismatch"
            exit 1
          fi
          echo "SHA-256 OK"

          mkdir -p "$ZIG_ROOT"
          case "$EXT" in
            zip)
              mkdir -p /tmp/zig-extract
              unzip -q "$DOWNLOAD" -d /tmp/zig-extract
              mv /tmp/zig-extract/*/* "$ZIG_ROOT"/
              rm -rf /tmp/zig-extract
              ;;
            *)
              tar -xf "$DOWNLOAD" -C "$ZIG_ROOT" --strip-components=1
              ;;
          esac
          rm -f "$DOWNLOAD"

      - name: Add Zig to PATH
        shell: bash
        run: echo "$HOME/.local/share/zig" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install boto3 botocore

      - name: Build z3
        run: zig build -Doptimize=ReleaseFast -Dbackend=${{ matrix.backend }}

      - name: Create data and tmp directories
        shell: bash
        run: mkdir -p data tmp log

      - name: Start z3 server
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          ./zig-out/bin/z3 --port=9000 --data-dir=./data --tmp=./tmp > /tmp/z3.stdout 2> /tmp/z3.stderr &
          Z3_PID=$!
          echo "$Z3_PID" > "${{ runner.temp }}/z3.pid"
          sleep 2
          if ! kill -0 "$Z3_PID" 2>/dev/null; then
            echo "::error::z3 exited immediately (PID $Z3_PID)"
            echo "--- stdout ---"; cat /tmp/z3.stdout
            echo "--- stderr ---"; cat /tmp/z3.stderr
            exit 1
          fi
          echo "z3 running (PID $Z3_PID)"

      - name: Wait for server
        shell: bash
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null -w '%{http_code}' http://localhost:9000/ 2>/dev/null | grep -q '200\|403'; then
              echo "Server ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start"
          exit 1

      - name: Run test_client.py
        id: test-client
        continue-on-error: true
        run: |
          python3 test_client.py
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Run test_comprehensive.py
        id: test-comprehensive
        continue-on-error: true
        run: |
          python3 test_comprehensive.py
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Run benchmark.py (smoke test)
        id: benchmark
        continue-on-error: true
        run: |
          python3 benchmark.py \
            --only=zs3 \
            --iterations=10 \
            --concurrency=10 \
            --requests-per-worker=5 \
            --mode=sequential
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Report test results
        if: always()
        run: |
          echo "::group::Test Summary"
          echo "test_client:        exit ${{ steps.test-client.outputs.exit }}"
          echo "test_comprehensive: exit ${{ steps.test-comprehensive.outputs.exit }}"
          echo "benchmark:          exit ${{ steps.benchmark.outputs.exit }}"
          echo "::endgroup::"

          if [ "${{ steps.test-client.outputs.exit }}" != "0" ] || \
             [ "${{ steps.test-comprehensive.outputs.exit }}" != "0" ] || \
             [ "${{ steps.benchmark.outputs.exit }}" != "0" ]; then
            echo "::error::One or more test suites failed"
            exit 1
          fi
          echo "All test suites passed"

      - name: Stop z3 server
        if: always() && (runner.os == 'Linux' || runner.os == 'macOS')
        shell: bash
        run: |
          if [ -f "${{ runner.temp }}/z3.pid" ]; then
            kill "$(cat "${{ runner.temp }}/z3.pid")" 2>/dev/null || true
          fi
